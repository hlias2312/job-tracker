{% extends 'jobs/base.html' %}
{% block content %}
<h2>{% if form.instance.pk %}Edit{% else %}New{% endif %} Application</h2>
<form method="post" class="mt-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'job_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>
{% endblock %}
