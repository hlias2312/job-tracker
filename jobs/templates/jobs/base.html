<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <div class="d-flex align-items-center gap-3">
        <span class="navbar-brand mb-0">🎯 Job Tracker</span>
        {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="{% url 'job_list' %}" class="btn btn-outline-light btn-sm">All Jobs</a>
        <a href="{% url 'job_create' %}" class="btn btn-outline-light btn-sm">+ Add New</a>
        {% endif %}
    </div>
    {% if user.is_authenticated %}
    <div>
        <span class="text-white me-3">{{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>
    {% endif %}
</nav>
<div class="container mt-4">
    {% for message in messages %}
    <div class="alert alert-success">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
